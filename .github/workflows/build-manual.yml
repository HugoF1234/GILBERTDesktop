name: Build Gilbert Desktop

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm install --legacy-peer-deps
        working-directory: desktop

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build Tauri (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        working-directory: desktop
        env:
          VITE_API_BASE_URL: https://gilbert-assistant.ovh

      - name: Sign, Notarize & Package DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: 2U6L38DLSW
        run: |
          APP="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Gilbert.app"
          DMG="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Gilbert_0.2.0_aarch64.dmg"
          IDENTITY="Developer ID Application: Mathis Escriva (2U6L38DLSW)"
          ENTITLEMENTS="desktop/src-tauri/entitlements.mac.plist"

          # Signer composants internes
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
            codesign --force --sign "$IDENTITY" --timestamp --options runtime "$f" || true
          done

          # Signer binaire principal
          codesign --force --sign "$IDENTITY" --timestamp --options runtime --entitlements "$ENTITLEMENTS" "$APP/Contents/MacOS/Gilbert"

          # Signer bundle
          codesign --force --sign "$IDENTITY" --timestamp --options runtime --entitlements "$ENTITLEMENTS" "$APP"

          # Vérifier
          codesign --verify --deep --strict "$APP" && echo "✅ Signature OK"
          codesign -dv "$APP" 2>&1 | grep -E "Authority|Timestamp"

          # Notariser l'app via zip
          ditto -c -k --keepParent "$APP" /tmp/Gilbert.zip
          xcrun notarytool submit /tmp/Gilbert.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notary_app.txt
          grep -q "status: Accepted" /tmp/notary_app.txt || { echo "❌ Notarisation app échouée"; cat /tmp/notary_app.txt; exit 1; }
          echo "✅ App notarisée"
          rm /tmp/Gilbert.zip

          # Stapler l'app
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP" && echo "✅ App staplée"
          spctl -a -vvv "$APP" 2>&1 | grep -E "accepted|source"

          # Créer DMG esthétique
          rm -f "$DMG"
          DMG_TMP="/tmp/Gilbert_tmp.dmg"
          mkdir -p /tmp/dmg-content
          cp -R "$APP" /tmp/dmg-content/
          ln -s /Applications /tmp/dmg-content/Applications
          hdiutil create -volname "Gilbert" -srcfolder /tmp/dmg-content -ov -format UDRW -size 200m "$DMG_TMP"
          rm -rf /tmp/dmg-content

          MOUNT_DIR=$(hdiutil attach "$DMG_TMP" -readwrite -noverify -noautoopen | grep /Volumes | awk '{print $NF}')
          sleep 2
          mkdir -p "$MOUNT_DIR/.background"
          cp "desktop/src-tauri/icons/dmg-background.png" "$MOUNT_DIR/.background/background.png"

          osascript <<APPLESCRIPT
            tell application "Finder"
              tell disk "Gilbert"
                open
                set current view of container window to icon view
                set toolbar visible of container window to false
                set statusbar visible of container window to false
                set the bounds of container window to {200, 120, 860, 520}
                set viewOptions to the icon view options of container window
                set arrangement of viewOptions to not arranged
                set icon size of viewOptions to 128
                set background picture of viewOptions to file ".background:background.png"
                set position of item "Gilbert.app" of container window to {165, 185}
                set position of item "Applications" of container window to {495, 185}
                close
                open
                update without registering applications
                delay 2
              end tell
            end tell
APPLESCRIPT

          sync
          hdiutil detach "$MOUNT_DIR" -force
          hdiutil convert "$DMG_TMP" -format UDZO -imagekey zlib-level=9 -o "$DMG"
          rm -f "$DMG_TMP"
          echo "✅ DMG créé"

          # Notariser le DMG
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notary_dmg.txt || true
          if grep -q "status: Accepted" /tmp/notary_dmg.txt; then
            xcrun stapler staple "$DMG" && echo "✅ DMG notarisé et staplé"
          else
            echo "ℹ️ DMG non staplé (app déjà notarisée à l'intérieur)"
          fi

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-macOS-arm64
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  publish-release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Gilbert latest
          prerelease: true
          body: |
            ## Gilbert Desktop — dernière version

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon (M1/M2/M3/M4) | `Gilbert_0.2.0_aarch64.dmg` |

            ### Installation macOS
            1. Télécharger le `.dmg`
            2. Double-cliquer → glisser Gilbert dans Applications
            3. Ouvrir normalement ✅ (app signée et notarisée)
          files: artifacts/**/*.dmg
