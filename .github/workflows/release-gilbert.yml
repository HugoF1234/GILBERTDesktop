name: Release Gilbert Desktop

on:
  push:
    tags:
      - "v*"          # déclenché sur : git tag v0.3.0 && git push --tags
  workflow_dispatch:  # ou lancement manuel depuis l'onglet Actions

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS — .dmg  (Apple Silicon)
  # Inclut Swift/ScreenCaptureKit pour la capture audio système
  # ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm install --legacy-peer-deps
        working-directory: desktop

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Créer un trousseau temporaire pour CI
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Importer le certificat
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build Tauri (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        working-directory: desktop
        env:
          VITE_API_BASE_URL: https://gilbert-assistant.ovh
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Mathis Escriva (2U6L38DLSW)"

      - name: Fix Info.plist CFBundleExecutable
        run: |
          PLIST="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Gilbert.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Gilbert" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Gilbert" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Gilbert" "$PLIST" || true
          fi
          echo "✅ Info.plist corrigé avant signature"

      - name: Sign app, create DMG, sign & notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: 2U6L38DLSW
        run: |
          APP="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Gilbert.app"
          DMG_DIR="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          DMG=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "❌ Aucun fichier .dmg trouvé dans $DMG_DIR"
            exit 1
          fi
          echo "DMG à signer: $DMG"
          IDENTITY="Developer ID Application: Mathis Escriva (2U6L38DLSW)"
          ENTITLEMENTS="desktop/src-tauri/entitlements.mac.plist"

          # ÉTAPE 1 : Signer tous les composants internes (de l'intérieur vers l'extérieur)
          # Apple recommande de signer dans l'ordre du plus profond au plus superficiel

          # 1a : dylib et .so
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
            codesign --force --sign "$IDENTITY" --timestamp --options runtime "$f" || true
          done

          # 1b : .framework complets (s'ils existent)
          find "$APP/Contents" -name "*.framework" -type d | while read fw; do
            codesign --force --sign "$IDENTITY" --timestamp --options runtime "$fw" || true
          done

          # 1c : helpers/exécutables dans Frameworks (hors binaire principal)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" -type f -perm -111 | while read f; do
              codesign --force --sign "$IDENTITY" --timestamp --options runtime "$f" || true
            done
          fi

          # ÉTAPE 2 : Signer le binaire principal
          codesign --force --sign "$IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP/Contents/MacOS/Gilbert"
          echo "✅ Binaire signé"

          # ÉTAPE 3 : Signer le bundle entier
          # --deep est volontairement omis : Apple le déconseille sur les bundles complexes
          # (risque de mal gérer les .framework imbriqués) — on a déjà signé manuellement ci-dessus
          codesign --force --sign "$IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"
          echo "✅ Bundle signé"

          # ÉTAPE 4 : Vérifier la signature (fail le CI si cassée)
          codesign --verify --deep --strict --verbose=2 "$APP" && echo "✅ Vérification signature OK"

          # ÉTAPE 5 : Notariser et stapler l'APP (OBLIGATOIRE)
          # L'app doit avoir son ticket pour que Gatekeeper l'accepte au lancement
          # (copie depuis DMG vers Applications = l'app doit avoir le staple)
          ditto -c -k --keepParent "$APP" /tmp/Gilbert.zip
          xcrun notarytool submit /tmp/Gilbert.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notary_result.txt

          if ! grep -q "status: Accepted" /tmp/notary_result.txt; then
            SUBMISSION_ID=$(grep "  id:" /tmp/notary_result.txt | head -1 | awk '{print $2}')
            echo "❌ Notarisation app échouée — log détaillé :"
            [ -n "$SUBMISSION_ID" ] && xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          echo "✅ Notarisation app acceptée"
          rm /tmp/Gilbert.zip
          xcrun stapler staple "$APP"
          echo "✅ App staplée"

          # ÉTAPE 6 : Créer le DMG esthétique avec hdiutil (app staplée à l'intérieur)
          rm -f "$DMG"
          DMG_TMP="/tmp/Gilbert_tmp.dmg"
          BACKGROUND="desktop/src-tauri/icons/dmg-background.png"

          # Créer un DMG temporaire en lecture-écriture pour le personnaliser
          mkdir -p /tmp/dmg-content
          cp -R "$APP" /tmp/dmg-content/
          ln -s /Applications /tmp/dmg-content/Applications
          hdiutil create -volname "Gilbert" \
            -srcfolder /tmp/dmg-content \
            -ov -format UDRW \
            -size 200m \
            "$DMG_TMP"
          rm -rf /tmp/dmg-content

          # Monter le DMG temporaire
          MOUNT_DIR=$(hdiutil attach "$DMG_TMP" -readwrite -noverify -noautoopen | grep /Volumes | awk '{print $NF}')
          echo "Monté sur: $MOUNT_DIR"
          sleep 2

          # Copier le fond dans le DMG
          mkdir -p "$MOUNT_DIR/.background"
          cp "$BACKGROUND" "$MOUNT_DIR/.background/background.png"

          # Appliquer le fond via AppleScript (optionnel si le fichier existe)
          if [ -f desktop/setup_dmg.applescript ]; then
            osascript desktop/setup_dmg.applescript || true
          fi

          # Démonter le DMG
          sync
          hdiutil detach "$MOUNT_DIR" -force

          # Convertir en DMG compressé final
          hdiutil convert "$DMG_TMP" -format UDZO -imagekey zlib-level=9 -o "$DMG"
          rm -f "$DMG_TMP"
          echo "✅ DMG compressé créé"

          # ÉTAPE 8 : Signer le DMG UDZO final
          # hdiutil convert recrée le fichier entièrement → signer APRÈS la conversion
          codesign --force --timestamp --sign "$IDENTITY" "$DMG"
          echo "✅ DMG signé"
          codesign -dv "$DMG" 2>&1 | grep -E "Authority|Timestamp"

          # ÉTAPE 9 : Notariser le DMG signé
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notary_dmg_result.txt

          if grep -q "status: Accepted" /tmp/notary_dmg_result.txt; then
            xcrun stapler staple "$DMG"
            echo "✅ DMG notarisé et staplé"
            # stapler validate = vérification fiable. spctl -t open peut retourner
            # "Insufficient Context" pour les DMG (comportement connu, pas une erreur)
            xcrun stapler validate "$DMG" && echo "✅ DMG staple validé"
          else
            echo "❌ Notarisation DMG échouée — ne pas publier un DMG non notarisé (message « suspect » pour l'utilisateur)"
            cat /tmp/notary_dmg_result.txt
            exit 1
          fi
          echo "✅ Pipeline terminé"

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-macOS-arm64
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ─────────────────────────────────────────────────────────────
  # Windows — .msi
  # (son système non disponible, micro uniquement)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm install --legacy-peer-deps
        working-directory: desktop

      - name: Build Tauri
        run: npm run tauri build
        working-directory: desktop
        env:
          VITE_API_BASE_URL: https://gilbert-assistant.ovh

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

  # ─────────────────────────────────────────────────────────────
  # Linux — .AppImage
  # (son système non disponible, micro uniquement)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Linux build non disponible (Tauri v1 + Ubuntu 22.04)
        run: |
          echo "⚠️ Le build Linux est temporairement désactivé."
          echo "Tauri v1 requiert libwebkit2gtk-4.0 qui n'est plus compatible avec Ubuntu 22.04."
          echo "Solution : migrer vers Tauri v2 ou utiliser un runner Ubuntu 20.04 dédié."
          mkdir -p desktop/src-tauri/target/release/bundle/appimage/
          # Placeholder pour que le job release puisse télécharger un artifact (évite l'échec)
          echo "Linux build désactivé - voir release notes" > desktop/src-tauri/target/release/bundle/appimage/LINUX_DISABLED.txt

      - name: Upload Linux artifact (placeholder)
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Linux
          path: desktop/src-tauri/target/release/bundle/appimage/LINUX_DISABLED.txt

  # ─────────────────────────────────────────────────────────────
  # Créer la GitHub Release avec les 3 binaires
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Gilbert ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.tag == 'latest' }}
          make_latest: true
          body: |
            ## Gilbert Desktop ${{ steps.tag.outputs.tag }}

            | Plateforme | Télécharger | Son système |
            |---|---|---|
            | macOS Apple Silicon (M1/M2/M3) | `.dmg` | ✅ Oui |
            | Windows 10/11 | `.msi` | Micro uniquement |
            | Linux | ⚠️ Bientôt disponible | - |

            ### macOS
            1. Télécharger le `.dmg`
            2. Double-cliquer → glisser Gilbert dans Applications
            3. Ouvrir normalement (app signée et notarisée ✅)

            ### Windows
            Double-cliquer sur le `.msi` → si SmartScreen s'affiche : "Informations complémentaires" → "Exécuter quand même"

            ### Linux
            ```bash
            chmod +x Gilbert_*.AppImage && ./Gilbert_*.AppImage
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.AppImage
