name: Release Gilbert Desktop

on:
  push:
    tags:
      - "v*"          # déclenché sur : git tag v0.3.0 && git push --tags
  workflow_dispatch:  # ou lancement manuel depuis l'onglet Actions

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS — .dmg  (Apple Silicon)
  # Inclut Swift/ScreenCaptureKit pour la capture audio système
  # ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm install --legacy-peer-deps
        working-directory: desktop

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Créer un trousseau temporaire pour CI
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Importer le certificat
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build Tauri (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        working-directory: desktop
        env:
          VITE_API_BASE_URL: https://gilbert-assistant.ovh

      - name: Sign & Notarize .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: 2U6L38DLSW
        run: |
          APP="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Gilbert.app"
          DMG="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Gilbert_0.2.0_aarch64.dmg"
          IDENTITY="Developer ID Application: Mathis Escriva (2U6L38DLSW)"
          ENTITLEMENTS="desktop/src-tauri/entitlements.mac.plist"

          # ÉTAPE 1 : Signer tous les composants internes d'abord
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
            codesign --force --sign "$IDENTITY" --timestamp --options runtime "$f" || true
          done

          # ÉTAPE 2 : Signer le binaire principal
          codesign --force --sign "$IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP/Contents/MacOS/Gilbert"
          echo "✅ Binaire signé"

          # ÉTAPE 3 : Signer le bundle entier
          codesign --force --sign "$IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"
          echo "✅ Bundle signé"

          # ÉTAPE 4 : Vérifier la signature
          codesign --verify --deep --strict "$APP" && echo "✅ Vérification signature OK"
          codesign -dv "$APP" 2>&1 | grep -E "Authority|TeamID|Timestamp"

          # ÉTAPE 5 : Notariser l'APP (pas le DMG) via un zip temporaire
          ditto -c -k --keepParent "$APP" /tmp/Gilbert.zip
          xcrun notarytool submit /tmp/Gilbert.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notary_result.txt || true

          if ! grep -q "status: Accepted" /tmp/notary_result.txt; then
            SUBMISSION_ID=$(grep "  id:" /tmp/notary_result.txt | head -1 | awk '{print $2}')
            echo "❌ Notarisation échouée — log détaillé :"
            [ -n "$SUBMISSION_ID" ] && xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          echo "✅ Notarisation app acceptée"
          rm /tmp/Gilbert.zip

          # ÉTAPE 6 : Stapler l'APP directement
          xcrun stapler staple "$APP"
          echo "✅ App staplée"

          # ÉTAPE 7 : Vérifier que l'app est bien notarisée
          xcrun stapler validate "$APP" && echo "✅ Staple validé"
          spctl -a -vvv "$APP" 2>&1 | grep -E "accepted|rejected|source"

          # ÉTAPE 8 : Créer le DMG avec l'app déjà notarisée + staplée
          rm -f "$DMG"
          mkdir -p /tmp/dmg-content
          cp -R "$APP" /tmp/dmg-content/
          ln -s /Applications /tmp/dmg-content/Applications
          hdiutil create -volname "Gilbert" \
            -srcfolder /tmp/dmg-content \
            -ov -format UDZO \
            "$DMG"
          rm -rf /tmp/dmg-content
          echo "✅ DMG créé avec app notarisée + staplée"

          # ÉTAPE 9 : Stapler aussi le DMG (bonus)
          xcrun stapler staple "$DMG"
          echo "✅ DMG staplé"

          # Agréer (staple)
          xcrun stapler staple "$DMG"
          echo "✅ Staple effectué"

      - name: Fix Info.plist CFBundleExecutable
        run: |
          PLIST="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Gilbert.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Gilbert" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Gilbert" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Gilbert" "$PLIST" || true
          fi

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-macOS-arm64
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ─────────────────────────────────────────────────────────────
  # Windows — .msi
  # (son système non disponible, micro uniquement)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm install --legacy-peer-deps
        working-directory: desktop

      - name: Build Tauri
        run: npm run tauri build
        working-directory: desktop
        env:
          VITE_API_BASE_URL: https://gilbert-assistant.ovh

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi

  # ─────────────────────────────────────────────────────────────
  # Linux — .AppImage
  # (son système non disponible, micro uniquement)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Linux build non disponible (Tauri v1 + Ubuntu 22.04)
        run: |
          echo "⚠️ Le build Linux est temporairement désactivé."
          echo "Tauri v1 requiert libwebkit2gtk-4.0 qui n'est plus compatible avec Ubuntu 22.04."
          echo "Solution : migrer vers Tauri v2 ou utiliser un runner Ubuntu 20.04 dédié."
          mkdir -p desktop/src-tauri/target/release/bundle/appimage/
          touch desktop/src-tauri/target/release/bundle/appimage/placeholder.txt

      - name: Upload placeholder
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Linux
          path: desktop/src-tauri/target/release/bundle/appimage/placeholder.txt

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Linux
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ─────────────────────────────────────────────────────────────
  # Créer la GitHub Release avec les 3 binaires
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Gilbert ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.tag == 'latest' }}
          body: |
            ## Gilbert Desktop ${{ steps.tag.outputs.tag }}

            | Plateforme | Télécharger | Son système |
            |---|---|---|
            | macOS Apple Silicon (M1/M2/M3) | `.dmg` | ✅ Oui |
            | Windows 10/11 | `.msi` | Micro uniquement |
            | Linux | ⚠️ Bientôt disponible | - |

            ### macOS
            1. Télécharger le `.dmg`
            2. Double-cliquer → glisser Gilbert dans Applications
            3. Ouvrir normalement (app signée et notarisée ✅)

            ### Windows
            Double-cliquer sur le `.msi` → si SmartScreen s'affiche : "Informations complémentaires" → "Exécuter quand même"

            ### Linux
            ```bash
            chmod +x Gilbert_*.AppImage && ./Gilbert_*.AppImage
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.AppImage
