name: Release Gilbert Desktop

on:
  push:
    tags:
      - "v*"          # git tag v1.2.1 && git push --tags
  workflow_dispatch:  # lancement manuel depuis l'onglet Actions

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS — .dmg signé + notarisé (Apple Silicon)
  # Ordre Apple-recommandé : build → sign app → DMG → sign DMG → notarise DMG → staple
  # ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg signé + notarisé)
    runs-on: macos-14  # Apple Silicon natif (M1)
    env:
      BUNDLE_ID: com.gilbert.desktop
      APP_NAME: Gilbert
      TARGET: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm ci --legacy-peer-deps
        working-directory: desktop

      # ── Import Developer ID Application certificate ──
      - name: Import Apple Developer ID Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "ci_keychain_pwd" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci_keychain_pwd" ci.keychain
          security import /tmp/certificate.p12 \
            -k ci.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "ci_keychain_pwd" ci.keychain
          security set-keychain-settings -t 3600 -u ci.keychain
          rm -f /tmp/certificate.p12
          echo "✅ Certificate imported"

      # ── Build Tauri (app + entitlements) ──
      - name: Build Tauri (Apple Silicon)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri:build:arm
        working-directory: desktop

      # ── STEP A : Vérifier la signature de l'app ──
      - name: Verify app signature
        run: |
          APP="desktop/src-tauri/target/$TARGET/release/bundle/macos/$APP_NAME.app"
          echo "Verifying: $APP"
          codesign --verify --deep --strict "$APP" && echo "✅ Signature valide"
          codesign -dv "$APP" 2>&1 | grep -E "Identifier|TeamIdentifier|Authority"

      # ── STEP B : Corriger Info.plist (nom = Gilbert, pas GilbertDesktop) ──
      - name: Fix Info.plist bundle name
        run: |
          PLIST="desktop/src-tauri/target/$TARGET/release/bundle/macos/$APP_NAME.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $APP_NAME" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName $APP_NAME" "$PLIST" 2>/dev/null || true
          echo "CFBundleDisplayName: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$PLIST" 2>/dev/null)"

      # ── STEP C : Re-signer l'app après modif Info.plist ──
      - name: Re-sign app after plist fix
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="desktop/src-tauri/target/$TARGET/release/bundle/macos/$APP_NAME.app"
          ENTITLEMENTS="desktop/src-tauri/entitlements.mac.plist"
          codesign --force --deep \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --identifier "$BUNDLE_ID" \
            --entitlements "$ENTITLEMENTS" \
            --no-strict \
            "$APP"
          echo "✅ App re-signée"

      # ── STEP D : Créer le DMG final ──
      - name: Create DMG
        run: |
          APP="desktop/src-tauri/target/$TARGET/release/bundle/macos/$APP_NAME.app"
          VERSION=$(node -e "const c=require('desktop/src-tauri/tauri.conf.json'); console.log(c.package.version)")
          DMG_PATH="Gilbert_${VERSION}_aarch64.dmg"
          hdiutil create \
            -format UDZO \
            -srcfolder "$APP" \
            -volname "Gilbert" \
            -o "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "✅ DMG créé: $DMG_PATH"

      # ── STEP E : Signer le DMG final ──
      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "${{ env.DMG_PATH }}"
          echo "✅ DMG signé"

      # ── STEP F : Notariser le DMG (pas l'app ni un ZIP intermédiaire) ──
      # Apple recommande de ne notariser QUE l'artefact final distribué
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ env.DMG_PATH }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600
          echo "✅ DMG notarisé"

      # ── STEP G : Staple le ticket de notarisation au DMG ──
      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "${{ env.DMG_PATH }}"
          echo "✅ Ticket agrafé au DMG"

      # ── STEP H : Vérification Gatekeeper ──
      - name: Verify Gatekeeper acceptance
        run: |
          spctl -a -vvv -t open --context context:primary-signature "${{ env.DMG_PATH }}" \
            && echo "✅ Gatekeeper: accepted" \
            || echo "⚠️ Gatekeeper check failed (non bloquant en CI)"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-macOS-arm64
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Windows — .msi (micro uniquement, pas de son système)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm ci --legacy-peer-deps
        working-directory: desktop

      - name: Build Tauri
        run: npm run tauri build
        working-directory: desktop

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Linux — .AppImage (micro uniquement)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install desktop deps
        run: npm ci --legacy-peer-deps
        working-directory: desktop

      - name: Build Tauri
        run: npm run tauri build
        working-directory: desktop

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gilbert-Linux
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # Créer la GitHub Release avec les binaires
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gilbert Desktop ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Gilbert Desktop ${{ github.ref_name }}

            ### Téléchargement

            | Plateforme | Fichier | Fonctionnalités |
            |---|---|---|
            | **macOS** Apple Silicon (M1/M2/M3) | `.dmg` (signé + notarisé) | ✅ Micro + Son système + Détection visio |
            | **Windows** 10/11 | `.msi` | ✅ Micro + Détection visio |
            | **Linux** | `.AppImage` | ✅ Micro + Détection visio |

            ### Installation macOS
            1. Télécharger le `.dmg`
            2. Glisser Gilbert dans Applications
            3. Double-cliquer pour ouvrir (Gatekeeper validé automatiquement)
            4. Accorder Microphone + Enregistrement d'écran au premier enregistrement

            ### Installation Windows
            Double-cliquer sur le `.msi` → Suivant → Installer

            ### Installation Linux
            ```bash
            chmod +x Gilbert_*.AppImage && ./Gilbert_*.AppImage
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.AppImage
