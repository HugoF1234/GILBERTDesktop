<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilbert Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 220px;
      height: 72px;
      background: transparent;
      overflow: hidden;
    }

    #widget {
      width: 220px;
      height: 72px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.18),
        0 2px 8px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      cursor: default;
      /* Drag depuis le widget entier */
      -webkit-app-region: drag;
      position: relative;
      transition: background 0.2s ease;
    }

    #widget.recording {
      background: rgba(239, 68, 68, 0.10);
      border-color: rgba(239, 68, 68, 0.25);
    }

    #widget.paused {
      background: rgba(251, 191, 36, 0.10);
      border-color: rgba(251, 191, 36, 0.25);
    }

    /* Empêcher le drag sur les boutons */
    button, .status-dot, .timer-text {
      -webkit-app-region: no-drag;
    }

    .status-section {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-dot.recording {
      background: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }

    .status-dot.paused {
      background: #f59e0b;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .timer-text {
      font-size: 10px;
      color: #64748b;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-variant-numeric: tabular-nums;
      margin-top: 1px;
    }

    .controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      font-size: 13px;
      outline: none;
    }

    button:active {
      transform: scale(0.92);
    }

    #btn-rec {
      background: #3b82f6;
      color: white;
    }
    #btn-rec:hover {
      background: #2563eb;
    }

    #btn-pause {
      background: rgba(251, 191, 36, 0.15);
      color: #d97706;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    #btn-pause:hover {
      background: rgba(251, 191, 36, 0.25);
    }

    #btn-resume {
      background: rgba(59, 130, 246, 0.12);
      color: #2563eb;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }
    #btn-resume:hover {
      background: rgba(59, 130, 246, 0.22);
    }

    #btn-stop {
      background: rgba(239, 68, 68, 0.10);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.20);
    }
    #btn-stop:hover {
      background: rgba(239, 68, 68, 0.20);
    }

    /* Bouton fermer en haut à droite */
    #btn-close {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      color: #64748b;
      font-size: 9px;
      border: none;
      -webkit-app-region: no-drag;
    }
    #btn-close:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #dc2626;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="widget">
    <button id="btn-close" title="Fermer le widget">✕</button>

    <div class="status-section">
      <div class="status-dot" id="status-dot"></div>
      <div class="info">
        <div class="label" id="label-text">Gilbert</div>
        <div class="timer-text" id="timer">00:00</div>
      </div>
    </div>

    <div class="controls">
      <!-- Idle : bouton Démarrer -->
      <button id="btn-rec" title="Démarrer l'enregistrement">
        <!-- Mic icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <!-- Recording : bouton Pause + Stop -->
      <button id="btn-pause" class="hidden" title="Mettre en pause">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button id="btn-stop" class="hidden" title="Arrêter l'enregistrement">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
      </button>

      <!-- Paused : bouton Reprendre + Stop -->
      <button id="btn-resume" class="hidden" title="Reprendre">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ── Tauri invoke helper ──────────────────────────────────────────────────
    const invoke = window.__TAURI__?.tauri?.invoke || window.__TAURI__?.core?.invoke;

    // ── State ────────────────────────────────────────────────────────────────
    let appState = 'idle'; // 'idle' | 'recording' | 'paused'
    let timerInterval = null;
    let elapsedSeconds = 0;

    // ── Elements ─────────────────────────────────────────────────────────────
    const widget   = document.getElementById('widget');
    const dot      = document.getElementById('status-dot');
    const label    = document.getElementById('label-text');
    const timerEl  = document.getElementById('timer');
    const btnRec    = document.getElementById('btn-rec');
    const btnPause  = document.getElementById('btn-pause');
    const btnStop   = document.getElementById('btn-stop');
    const btnResume = document.getElementById('btn-resume');
    const btnClose  = document.getElementById('btn-close');

    // ── Timer helpers ─────────────────────────────────────────────────────────
    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function startTimer() {
      stopTimer();
      elapsedSeconds = 0;
      timerInterval = setInterval(() => {
        elapsedSeconds++;
        timerEl.textContent = formatTime(elapsedSeconds);
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // ── UI update ─────────────────────────────────────────────────────────────
    function updateUI(state) {
      appState = state;
      widget.className = state === 'recording' ? 'recording' : state === 'paused' ? 'paused' : '';
      dot.className = 'status-dot' + (state === 'recording' ? ' recording' : state === 'paused' ? ' paused' : '');

      // Labels
      if (state === 'idle') {
        label.textContent = 'Gilbert';
        timerEl.textContent = '00:00';
      } else if (state === 'recording') {
        label.textContent = 'Enregistrement';
      } else {
        label.textContent = 'En pause';
      }

      // Buttons visibility
      btnRec.classList.toggle('hidden', state !== 'idle');
      btnPause.classList.toggle('hidden', state !== 'recording');
      btnStop.classList.toggle('hidden', state === 'idle');
      btnResume.classList.toggle('hidden', state !== 'paused');
    }

    // ── Button actions ────────────────────────────────────────────────────────
    btnRec.addEventListener('click', async () => {
      try {
        // Récupérer le token depuis le localStorage de la fenêtre principale
        // (partagé car même app, même origin)
        const token = localStorage.getItem('auth_token') || '';
        await invoke('start_record', { mode: 'both', token, title: null });
        updateUI('recording');
        startTimer();
      } catch (e) {
        console.error('start_record error:', e);
      }
    });

    btnPause.addEventListener('click', async () => {
      try {
        await invoke('pause_record');
        updateUI('paused');
        stopTimer();
      } catch (e) {
        console.error('pause_record error:', e);
      }
    });

    btnResume.addEventListener('click', async () => {
      try {
        await invoke('resume_record');
        updateUI('recording');
        // Reprendre le timer sans reset
        timerInterval = setInterval(() => {
          elapsedSeconds++;
          timerEl.textContent = formatTime(elapsedSeconds);
        }, 1000);
      } catch (e) {
        console.error('resume_record error:', e);
      }
    });

    btnStop.addEventListener('click', async () => {
      try {
        const token = localStorage.getItem('auth_token') || '';
        // Stop sans titre — le frontend principal gère le dialog de sauvegarde
        // On envoie un event custom pour que la fenêtre principale s'affiche
        if (window.__TAURI__?.event) {
          await window.__TAURI__.event.emit('widget-stop-recording', {});
        }
        // Afficher la fenêtre principale
        if (window.__TAURI__?.window?.WebviewWindow) {
          const main = window.__TAURI__.window.WebviewWindow.getByLabel('main');
          if (main) { await main.show(); await main.setFocus(); }
        }
        updateUI('idle');
        stopTimer();
      } catch (e) {
        console.error('stop_record error:', e);
      }
    });

    btnClose.addEventListener('click', async () => {
      try {
        await invoke('hide_widget');
      } catch (e) {
        // fallback
        if (window.__TAURI__?.window?.appWindow) {
          await window.__TAURI__.window.appWindow.hide();
        }
      }
    });

    // ── Sync état avec fenêtre principale ─────────────────────────────────────
    // Écouter les events Tauri pour rester synchronisé
    if (window.__TAURI__?.event?.listen) {
      window.__TAURI__.event.listen('recording-state-changed', (event) => {
        const { state } = event.payload || {};
        if (state === 'recording') { updateUI('recording'); startTimer(); }
        else if (state === 'paused') { updateUI('paused'); stopTimer(); }
        else { updateUI('idle'); stopTimer(); }
      });
      // Démarrage depuis tray ou notif
      window.__TAURI__.event.listen('tray-start-recording', () => {
        btnRec.click();
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    updateUI('idle');
  </script>
</body>
</html>
