user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # Docker embedded DNS resolver to resolve service names at runtime
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Limites globales (fallback) pour tous les serveurs
    client_max_body_size 6G;
    client_body_timeout 3600s;
    send_timeout 1800s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    
    # Serveur HTTP - Redirection vers HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name gilbert-assistant.ovh _;
        
        # Challenge ACME pour Let's Encrypt (renouvellement)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
        
        # Redirection de tout le reste vers HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }
    
    # Serveur HTTPS
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name gilbert-assistant.ovh _;
        
        # Certificats SSL
        ssl_certificate /etc/letsencrypt/live/gilbert-assistant.ovh/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gilbert-assistant.ovh/privkey.pem;
        
        # Configuration SSL moderne et sécurisée
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # Headers de sécurité HTTPS
        add_header Strict-Transport-Security "max-age=31536000" always;
        
        location /health {
            # Headers CORS pour toutes les origines (web + desktop)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            add_header Content-Type text/plain always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            return 200 "healthy\n";
        }
        
        # Limites augmentées pour gros uploads et timeouts plus élevés
        client_max_body_size 6G;
        client_body_timeout 3600s;
        send_timeout 1800s;

        # Routes API
        location /api/ {
            # Use variable to defer DNS resolution to runtime (avoids nginx -t failure)
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # API simplifiée (simple/meetings/*) utilisée par le frontend
        location /simple/ {
            set $simple_upstream http://api:8000;
            proxy_pass $simple_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1800s;
            # Ne pas bufferiser le corps de la requête pour améliorer les gros uploads
            proxy_request_buffering off;
            client_max_body_size 6G;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }
        
        # Routes d'authentification
        location /auth/ {
            set $auth_upstream http://api:8000;
            proxy_pass $auth_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # ✅ CORRECTION : Routes SPA exactes (sans sous-chemin) → frontend
        # Ces routes doivent être AVANT les locations avec slash pour être prioritaires
        location = /admin {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        location = /meetings {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Route SPA /meetings/folders → frontend
        location = /meetings/folders {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Route SPA /meetings/{uuid} - routage conditionnel basé sur la méthode HTTP
        # GET/HEAD → frontend (navigation SPA)
        # PUT/POST/DELETE/PATCH → backend API
        location ~ "^/meetings/[a-f0-9-]{36}$" {
            # Par défaut, on route vers le frontend (pour la navigation SPA)
            set $meeting_upstream http://frontend:80;

            # Pour les méthodes d'écriture (API calls), on route vers le backend
            if ($request_method = PUT) {
                set $meeting_upstream http://api:8000;
            }
            if ($request_method = POST) {
                set $meeting_upstream http://api:8000;
            }
            if ($request_method = DELETE) {
                set $meeting_upstream http://api:8000;
            }
            if ($request_method = PATCH) {
                set $meeting_upstream http://api:8000;
            }

            proxy_pass $meeting_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 300s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Route SPA /admin/users/{uuid} → frontend (détails utilisateur)
        location ~ "^/admin/users/[a-f0-9-]+$" {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Routes d'administration API (avec sous-chemins) → backend
        location /admin/ {
            set $admin_upstream http://api:8000;
            proxy_pass $admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Routes d'enregistrement
        location /recordings/ {
            set $recordings_upstream http://api:8000;
            proxy_pass $recordings_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Route SPA /profile → frontend (navigation navigateur)
        location = /profile {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Route SPA /profile/ (avec slash) → frontend
        location = /profile/ {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }

        # Routes de profil API (avec sous-chemins comme /profile/me) → backend
        location ~ ^/profile/.+ {
            set $profile_upstream http://api:8000;
            proxy_pass $profile_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Routes meetings API (avec sous-chemins ou UUID) → backend
        location /meetings/ {
            set $meetings_upstream http://api:8000;
            proxy_pass $meetings_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 300s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Routes de queue (système de queue Redis + Celery)
        location /queue/ {
            set $queue_upstream http://api:8000;
            proxy_pass $queue_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1800s;
            # Ne pas bufferiser le corps de la requête pour améliorer les gros uploads
            proxy_request_buffering off;
            client_max_body_size 6G;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # Fichiers statiques servis par l'API (photos de profil, etc.)
        location ^~ /uploads/ {
            # Force-match uploads before generic "/" and keep the original URI
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }
        
        # Documentation API
        location /docs {
            set $docs_upstream http://api:8000;
            proxy_pass $docs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control, Pragma" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }
        
        location / {
            # Use variable to defer DNS resolution to runtime for the frontend too
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
        }
    }
}
